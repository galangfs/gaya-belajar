const LS_PROGRESS = "gbk_progress_v1";
const LS_RECORDS = "gbk_records_v1";

/* ============================= HELPERS ============================= */

function loadProgress(){
  try{ const raw = localStorage.getItem(LS_PROGRESS); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }
}
function saveProgress(data){
  try{ localStorage.setItem(LS_PROGRESS, JSON.stringify(data)); }catch(e){}
}
function clearProgress(){
  try{ localStorage.removeItem(LS_PROGRESS); }catch(e){}
}
function loadRecords(){
  try{ const raw = localStorage.getItem(LS_RECORDS); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
}
function saveRecord(record){
  const records = loadRecords();
  records.push(record);
  try{ localStorage.setItem(LS_RECORDS, JSON.stringify(records)); }catch(e){}
}

function computeScores(answers){
  const counts = { visual: 0, auditory: 0, kinesthetic: 0 };
  const bySection = SECTIONS.map(s => ({ key: s.key, title: s.title, visual: 0, auditory: 0, kinesthetic: 0 }));

  ALL_QUESTIONS.forEach(q => {
    const letter = answers[q.globalIndex];
    if(!letter) return;
    const style = q.mapping[letter];
    counts[style]++;
    bySection[q.sectionIndex][style]++;
  });

  const total = ALL_QUESTIONS.length;
  const percentages = {
    visual: Math.round((counts.visual / total) * 1000) / 10,
    auditory: Math.round((counts.auditory / total) * 1000) / 10,
    kinesthetic: Math.round((counts.kinesthetic / total) * 1000) / 10
  };

  let dominant = "visual";
  if(counts.auditory > counts[dominant]) dominant = "auditory";
  if(counts.kinesthetic > counts[dominant]) dominant = "kinesthetic";

  const maxVal = Math.max(counts.visual, counts.auditory, counts.kinesthetic);
  const tied = Object.keys(counts).filter(k => counts[k] === maxVal);

  return { counts, percentages, dominant, tied, bySection };
}

function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString("id-ID", { day:"2-digit", month:"short", year:"numeric" }) + " " + d.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
}

/* ============================= QUIZ SCREEN ============================= */

function QuizScreen({ answers, onAnswer, currentIndex, onNext, onPrev, direction }){
  const question = ALL_QUESTIONS[currentIndex];
  const total = ALL_QUESTIONS.length;
  const progress = Math.round(((currentIndex) / total) * 100);
  const selected = answers[currentIndex];

  const sectionEmoji = { environment: "🏠", dailyLife: "📱", indonesian: "📖" };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-8 relative z-10">
      <div className="w-full max-w-xl">
        <div className="flex items-center justify-between text-white/90 text-xs font-semibold mb-2 px-1">
          <span>{sectionEmoji[question.sectionKey]} {question.sectionTitle}</span>
          <span>{currentIndex + 1} / {total}</span>
        </div>
        <div className="progress-track h-2.5 mb-6">
          <div className="progress-fill" style={{ width: `${progress}%` }}></div>
        </div>

        <div key={currentIndex} className={"glass rounded-3xl p-6 sm:p-8 shadow-2xl " + (direction === "back" ? "q-enter-back" : "q-enter")}>
          <p className="font-display text-white text-lg sm:text-xl font-bold leading-snug mb-6">
            {question.q}
          </p>

          <div className="space-y-3">
            {["A","B","C"].map(letter => (
              <div key={letter}
                onClick={() => onAnswer(currentIndex, letter)}
                className={"option-card rounded-2xl border-2 p-4 flex items-start gap-3 " + (selected === letter ? "selected" : "border-transparent bg-white/90")}
              >
                <div className={"w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 " + (selected === letter ? "bg-purple-600 text-white" : "bg-slate-200 text-slate-600")}>
                  {letter}
                </div>
                <p className="text-sm text-slate-700 leading-snug">{question[letter]}</p>
              </div>
            ))}
          </div>

          <div className="flex items-center justify-between mt-7 gap-3">
            <button onClick={onPrev} disabled={currentIndex === 0}
              className="btn-ghost rounded-xl px-5 py-2.5 text-sm font-semibold flex-1 sm:flex-none">
              ← Kembali
            </button>
            <button onClick={onNext} disabled={!selected}
              className="btn-primary rounded-xl px-6 py-2.5 text-sm font-bold flex-1 sm:flex-none">
              {currentIndex === total - 1 ? "Lihat Hasil ✨" : "Lanjut →"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================= CHART COMPONENTS ============================= */

function RadarChart({ percentages }){
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const ctx = canvasRef.current.getContext("2d");
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "radar",
      data: {
        labels: ["Visual 👀", "Auditory 🎧", "Kinesthetic 🏃"],
        datasets: [{
          label: "Persentase (%)",
          data: [percentages.visual, percentages.auditory, percentages.kinesthetic],
          backgroundColor: "rgba(124,58,237,0.25)",
          borderColor: "#7C3AED",
          borderWidth: 2,
          pointBackgroundColor: ["#3B82F6","#A855F7","#10B981"],
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { r: { suggestedMin:0, suggestedMax:100, ticks:{ backdropColor:"transparent", color:"#64748B" }, grid:{color:"#CBD5E1"}, angleLines:{color:"#CBD5E1"} } },
        plugins: { legend: { display:false } }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [percentages]);

  return <div style={{height:260}}><canvas ref={canvasRef}></canvas></div>;
}

function DoughnutChart({ percentages }){
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const ctx = canvasRef.current.getContext("2d");
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Visual", "Auditory", "Kinesthetic"],
        datasets: [{
          data: [percentages.visual, percentages.auditory, percentages.kinesthetic],
          backgroundColor: ["#3B82F6","#A855F7","#10B981"],
          borderWidth: 3,
          borderColor: "#fff"
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "62%",
        plugins: { legend: { position:"bottom", labels:{ color:"#475569", font:{ family:"Inter", weight:"600" } } } }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [percentages]);

  return <div style={{height:260}}><canvas ref={canvasRef}></canvas></div>;
}

function SectionBarChart({ bySection }){
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const ctx = canvasRef.current.getContext("2d");
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["Latar Belakang\n(Lingkungan)", "Gaya Belajar\n(Keseharian)", "Bahasa Indonesia"],
        datasets: [
          { label:"Visual", data: bySection.map(s=>s.visual), backgroundColor:"#3B82F6", borderRadius:6 },
          { label:"Auditory", data: bySection.map(s=>s.auditory), backgroundColor:"#A855F7", borderRadius:6 },
          { label:"Kinesthetic", data: bySection.map(s=>s.kinesthetic), backgroundColor:"#10B981", borderRadius:6 }
        ]
      },
      options: {
        responsive:true,
        maintainAspectRatio:false,
        scales: {
          x: { ticks:{ color:"#475569", font:{ size:11 } }, grid:{ display:false } },
          y: { beginAtZero:true, max:10, ticks:{ stepSize:2, color:"#475569" }, grid:{ color:"#E2E8F0" } }
        },
        plugins: { legend: { position:"bottom", labels:{ color:"#475569", font:{ weight:"600" } } } }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [bySection]);

  return <div style={{height:280}}><canvas ref={canvasRef}></canvas></div>;
}

function QRBlock(){
  const ref = useRef(null);
  useEffect(() => {
    if(ref.current){
      ref.current.innerHTML = "";
      new QRCode(ref.current, {
        text: window.location.href,
        width: 108,
        height: 108,
        colorDark: "#312E81",
        colorLight: "#ffffff"
      });
    }
  }, []);
  return <div ref={ref} className="inline-block p-2 bg-white rounded-xl shadow"></div>;
}

/* ============================= RESULT SCREEN ============================= */

function ResultScreen({ student, answers, onRetake }){
  const resultRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const scoring = useMemo(() => computeScores(answers), [answers]);
  const { percentages, dominant, tied, bySection } = scoring;
  const dom = STYLE_INFO[dominant];

  useEffect(() => {
    saveRecord({
      id: Date.now() + "_" + Math.random().toString(36).slice(2,8),
      name: student.name,
      kelas: student.kelas,
      timestamp: Date.now(),
      percentages,
      dominant
    });
    clearProgress();
  }, []);

  const handleDownloadPdf = async () => {
    const el = resultRef.current;
    const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#ffffff" });
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 20;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
    pdf.save(`Hasil-GayaBelajarku-${student.name}.pdf`);
  };

  const handlePrint = () => window.print();

  const handleShare = async () => {
    const text = `Hasil Gaya Belajarku: ${dom.emoji} ${dom.label} (${percentages[dominant]}%) — coba juga di Gaya Belajarku!`;
    if(navigator.share){
      try{ await navigator.share({ title:"Gaya Belajarku", text, url: window.location.href }); }catch(e){}
    } else {
      try{
        await navigator.clipboard.writeText(text + " " + window.location.href);
        setCopied(true);
        setTimeout(()=>setCopied(false), 2000);
      }catch(e){}
    }
  };

  return (
    <div className="min-h-screen px-4 py-8 relative z-10">
      <div className="max-w-3xl mx-auto" ref={resultRef}>

        <div className="text-center mb-6 pop-in">
          <p className="text-white/80 text-sm font-semibold">Hasil untuk</p>
          <h2 className="font-display text-2xl font-extrabold text-white">{student.name} · {student.kelas}</h2>
        </div>

        <div className="glass rounded-3xl p-6 sm:p-8 shadow-2xl mb-6 pop-in text-center" style={{animationDelay:".05s"}}>
          <p className="text-white/80 text-xs font-bold uppercase tracking-wider mb-1">Gaya Belajar Dominan</p>
          <div className="text-6xl mb-2">{dom.emoji}</div>
          <h1 className="font-display text-3xl font-extrabold text-white mb-1">{dom.label}</h1>
          <p className="text-white/85 text-sm mb-4">{percentages[dominant]}% dari total jawaban</p>
          {tied.length > 1 && (
            <p className="text-yellow-200 text-xs mb-2">✨ Kamu punya kombinasi gaya belajar yang seimbang!</p>
          )}

          <div className="grid grid-cols-3 gap-3 mt-4">
            {["visual","auditory","kinesthetic"].map(key => (
              <div key={key} className="glass-card-light rounded-2xl p-3">
                <div className="text-2xl mb-1">{STYLE_INFO[key].emoji}</div>
                <div className="text-xs font-bold text-slate-500">{STYLE_INFO[key].label}</div>
                <div className="text-lg font-extrabold" style={{color: STYLE_INFO[key].color}}>{percentages[key]}%</div>
              </div>
            ))}
          </div>
        </div>

        <div className="grid sm:grid-cols-2 gap-5 mb-6">
          <div className="glass-card-light rounded-3xl p-5 shadow-xl pop-in" style={{animationDelay:".1s"}}>
            <h3 className="font-display font-bold text-slate-700 mb-2 text-sm">📊 Radar Gaya Belajar</h3>
            <RadarChart percentages={percentages} />
          </div>
          <div className="glass-card-light rounded-3xl p-5 shadow-xl pop-in" style={{animationDelay:".15s"}}>
            <h3 className="font-display font-bold text-slate-700 mb-2 text-sm">🍩 Distribusi Gaya Belajar</h3>
            <DoughnutChart percentages={percentages} />

        </div>

        <div className="glass-card-light rounded-3xl p-5 shadow-xl mb-6 pop-in" style={{animationDelay:".2s"}}>

        <div className="glass-card-light rounded-3xl p-6 shadow-xl mb-6 pop-in" style={{animationDelay:".25s"}}>
          <h3 className="font-display font-bold text-lg mb-4" style={{color: dom.color}}>
            {dom.emoji} Tentang Gaya {dom.label}
          </h3>

          <div className="grid sm:grid-cols-3 gap-4 text-sm">
            <div>
              <p className="font-bold text-slate-600 mb-2">Ciri-ciri</p>
              <ul className="space-y-1.5 text-slate-500">
                {dom.characteristics.map((c,i)=>(<li key={i} className="flex gap-1.5"><span>✓</span><span>{c}</span></li>))}

/* ============================= TEACHER DASHBOARD ============================= */

function TeacherDashboard(){
  const [records, setRecords] = useState([]);
  const [filterKelas, setFilterKelas] = useState("Semua");
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => { setRecords(loadRecords()); }, []);

  const kelasList = useMemo(() => ["Semua", ...Array.from(new Set(records.map(r=>r.kelas)))], [records]);
  const filtered = useMemo(() => filterKelas === "Semua" ? records : records.filter(r=>r.kelas===filterKelas), [records, filterKelas]);

  const distribution = useMemo(() => {
    const d = { visual:0, auditory:0, kinesthetic:0 };
    filtered.forEach(r => d[r.dominant]++);
    return d;
  }, [filtered]);

  useEffect(() => {
    if(!canvasRef.current) return;
    const ctx = canvasRef.current.getContext("2d");
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "pie",
      data: {
        labels: ["Visual 👀","Auditory 🎧","Kinesthetic 🏃"],
        datasets: [{ data:[distribution.visual, distribution.auditory, distribution.kinesthetic], backgroundColor:["#3B82F6","#A855F7","#10B981"], borderWidth:3, borderColor:"#fff" }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"bottom", labels:{ color:"#475569", font:{weight:"600"} } } } }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [distribution]);

  const handleExportCsv = () => {
    const header = ["Nama","Kelas","Tanggal","Visual (%)","Auditory (%)","Kinesthetic (%)","Dominan"];
    const rows = filtered.map(r => [
      r.name, r.kelas, formatDate(r.timestamp),
      r.percentages.visual, r.percentages.auditory, r.percentages.kinesthetic, STYLE_INFO[r.dominant].label
    ]);
    const csv = [header, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "hasil-gaya-belajarku.csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="min-h-screen px-4 py-8 relative z-10">
      <div className="max-w-5xl mx-auto">
        <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
          <h1 className="font-display text-2xl font-extrabold text-white">📋 Dashboard Guru</h1>
          <a href="#" className="btn-ghost rounded-xl px-4 py-2 text-xs font-bold text-white">← Kembali ke Beranda</a>
        </div>

        <div className="glass rounded-3xl p-5 mb-6 flex flex-wrap items-center gap-3">
          <label className="text-white text-xs font-bold">Filter Kelas:</label>
          <select value={filterKelas} onChange={e=>setFilterKelas(e.target.value)} className="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700">
            {kelasList.map(k => <option key={k} value={k}>{k}</option>)}
          </select>
          <span className="text-white/80 text-xs ml-auto">{filtered.length} siswa</span>
          <button onClick={handleExportCsv} className="btn-primary rounded-xl px-4 py-2 text-xs font-bold">⬇️ Export CSV</button>
        </div>

        <div className="grid sm:grid-cols-3 gap-5 mb-6">
          <div className="glass-card-light rounded-3xl p-5 shadow-xl sm:col-span-1">
            <h3 className="font-display font-bold text-slate-700 mb-2 text-sm">Distribusi Gaya Belajar</h3>
            <div style={{height:220}}><canvas ref={canvasRef}></canvas></div>
          </div>
          <div className="glass-card-light rounded-3xl p-5 shadow-xl sm:col-span-2 overflow-x-auto">
            <h3 className="font-display font-bold text-slate-700 mb-3 text-sm">Daftar Hasil Siswa</h3>
            {filtered.length === 0 ? (
              <p className="text-slate-400 text-sm">Belum ada data siswa untuk kelas ini.</p>
            ) : (
              <table className="w-full text-xs text-left">
                <thead>
                  <tr className="text-slate-400 border-b">
                    <th className="py-2 pr-3">Nama</th>
                    <th className="py-2 pr-3">Kelas</th>
                    <th className="py-2 pr-3">Tanggal</th>
                    <th className="py-2 pr-3">Dominan</th>
                    <th className="py-2 pr-3">V/A/K (%)</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.slice().reverse().map(r => (
                    <tr key={r.id} className="border-b last:border-0">
                      <td className="py-2 pr-3 font-semibold text-slate-700">{r.name}</td>
                      <td className="py-2 pr-3 text-slate-500">{r.kelas}</td>
                      <td className="py-2 pr-3 text-slate-500">{formatDate(r.timestamp)}</td>
                      <td className="py-2 pr-3">{STYLE_INFO[r.dominant].emoji} {STYLE_INFO[r.dominant].label}</td>
                      <td className="py-2 pr-3 text-slate-500">{r.percentages.visual}/{r.percentages.auditory}/{r.percentages.kinesthetic}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================= APP ROOT ============================= */

function App(){
  const [dark, setDark] = useState(false);
  const [route, setRoute] = useState(window.location.hash === "#teacher" ? "teacher" : "app");
  const [page, setPage] = useState("welcome"); // welcome | quiz | loading | result
  const [student, setStudent] = useState({ name:"", kelas:"" });
  const [answers, setAnswers] = useState({});
  const [currentIndex, setCurrentIndex] = useState(0);
  const [direction, setDirection] = useState("fwd");

  useEffect(() => {
    const onHash = () => setRoute(window.location.hash === "#teacher" ? "teacher" : "app");
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => {
    const saved = loadProgress();
    if(saved && saved.page === "quiz" && saved.answers && Object.keys(saved.answers).length > 0){
      setStudent(saved.student);
      setAnswers(saved.answers);
      setCurrentIndex(saved.currentIndex || 0);
      setPage("quiz");
    }
    if(saved && typeof saved.dark === "boolean") setDark(saved.dark);
  }, []);

  useEffect(() => {
    if(page === "quiz"){
      saveProgress({ page, student, answers, currentIndex, dark });
    }
  }, [page, student, answers, currentIndex, dark]);

  const handleStart = (name, kelas) => {
    setStudent({ name, kelas });
    setAnswers({});
    setCurrentIndex(0);
    setPage("quiz");
  };

  const handleAnswer = (idx, letter) => {
    setAnswers(prev => ({ ...prev, [idx]: letter }));
  };

  const handleNext = () => {
    if(currentIndex < ALL_QUESTIONS.length - 1){
      setDirection("fwd");
      setCurrentIndex(i => i + 1);
    } else {
      setPage("loading");
      setTimeout(() => setPage("result"), 1400);
    }
  };

  const handlePrev = () => {
    setDirection("back");
    setCurrentIndex(i => Math.max(0, i - 1));
  };

  const handleRetake = () => {
    clearProgress();
    setAnswers({});
    setCurrentIndex(0);
    setStudent({ name:"", kelas:"" });
    setPage("welcome");
  };

  const toggleDark = () => setDark(d => !d);

  return (
    <div className={(dark ? "dark " : "") + "app-bg " + (dark ? "dark-bg" : "")}>
      <Blobs />
      <DarkModeToggle dark={dark} onToggle={toggleDark} />

      {route === "teacher" ? (
        <TeacherDashboard />
      ) : (
        <>
          {page === "welcome" && <WelcomeScreen onStart={handleStart} dark={dark} />}
          {page === "quiz" && (
            <QuizScreen
              answers={answers}
              onAnswer={handleAnswer}
              currentIndex={currentIndex}
              onNext={handleNext}
              onPrev={handlePrev}
              direction={direction}
            />
          )}
          {page === "loading" && <LoadingScreen />}
          {page === "result" && <ResultScreen student={student} answers={answers} onRetake={handleRetake} />}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
